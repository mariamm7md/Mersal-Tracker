<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام متطوعي مرسال | Mersal Volunteers</title>
    
    <!-- الخطوط والأيقونات -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        :root {
            --primary: #0056b3;
            --primary-dark: #003d80;
            --accent: #e63946;
            --success: #28a745;
            --bg: #f8f9fa;
            --text: #333;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        .container { max-width: 600px; margin: 0 auto; padding: 20px; }

        /* الأنيميشن */
        .page { display: none; animation: fadeIn 0.4s ease-out; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* البطاقات (Cards) */
        .card {
            background: #fff;
            border-radius: 20px;
            padding: 30px;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
            border: 1px solid rgba(0,0,0,0.05);
        }

        .logo-area { text-align: center; margin-bottom: 30px; }
        .logo-area img { width: 140px; }

        /* المدخلات */
        .field { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; color: #666; }
        input, select {
            width: 100%; padding: 12px 15px; border-radius: 12px;
            border: 2px solid #eee; font-family: inherit; font-size: 16px;
            transition: 0.3s; outline: none;
        }
        input:focus { border-color: var(--primary); background: #fff; }

        /* الأزرار */
        .btn {
            width: 100%; padding: 14px; border-radius: 12px; border: none;
            font-family: inherit; font-size: 16px; font-weight: 700;
            cursor: pointer; transition: 0.3s; margin-top: 10px;
        }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-2px); }
        .btn-outline { background: transparent; border: 2px solid #eee; color: #666; }
        .btn-danger { background: var(--accent); color: #fff; }

        /* التايمر */
        #timer-display {
            font-size: 56px; font-weight: 900; text-align: center;
            color: var(--primary); margin: 20px 0; font-variant-numeric: tabular-nums;
        }

        /* الإحصائيات */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .stat-card { background: #f0f7ff; padding: 15px; border-radius: 15px; text-align: center; border: 1px solid #d0e4ff; }
        .stat-card span { display: block; font-size: 24px; font-weight: 800; color: var(--primary); }
        .stat-card small { color: #666; font-weight: 600; }

        /* جدول الإدارة */
        .admin-table-wrapper { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; text-align: right; }
        th { background: #f4f4f4; padding: 12px; font-size: 14px; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">

    <!-- 1. صفحة تسجيل الدخول -->
    <div id="page-login" class="page active">
        <div class="card">
            <div class="logo-area">
                <img src="https://admin.mersal-egypt.org/static/images/logo.png" alt="Mersal">
                <h2 style="margin-top:10px; color:var(--primary)">بوابة المتطوعين</h2>
            </div>
            
            <div class="field">
                <label>البريد الإلكتروني أو رقم الهاتف</label>
                <input type="text" id="login-id" placeholder="أدخل بياناتك">
            </div>
            
            <div class="field">
                <label>كلمة المرور</label>
                <input type="password" id="login-pass" placeholder="••••••••">
            </div>

            <div id="select-profile-area" class="field" style="display:none">
                <label style="color:var(--accent)">تم العثور على أكثر من ملف، اختر اسمك:</label>
                <select id="login-name-select"></select>
            </div>

            <button class="btn btn-primary" onclick="handleLogin()">تسجيل الدخول</button>
            
            <p style="text-align:center; margin-top:20px; font-size:14px">
                متطوع جديد؟ <a href="javascript:void(0)" onclick="showPage('page-register')" style="color:var(--primary); font-weight:700; text-decoration:none">إنشاء حساب</a>
            </p>
        </div>
        <button class="btn btn-outline" onclick="checkAdminAccess()">لوحة الإدارة (للمشرفين)</button>
    </div>

    <!-- 2. صفحة التسجيل -->
    <div id="page-register" class="page">
        <div class="card">
            <h2>انضم لفريق مرسال</h2>
            <p style="color:#666; margin-bottom:20px">سجل بياناتك للبدء في توثيق ساعاتك التطوعية.</p>
            
            <div class="field"><label>الاسم بالكامل</label><input type="text" id="reg-name"></div>
            <div class="field"><label>البريد الإلكتروني</label><input type="email" id="reg-email"></div>
            <div class="field"><label>رقم الهاتف</label><input type="text" id="reg-phone"></div>
            <div class="field"><label>كلمة المرور</label><input type="password" id="reg-pass"></div>
            
            <button class="btn btn-primary" onclick="handleRegister()">إتمام التسجيل</button>
            <button class="btn btn-outline" onclick="showPage('page-login')">العودة للدخول</button>
        </div>
    </div>

    <!-- 3. لوحة المتطوع -->
    <div id="page-dash" class="page">
        <div class="card" style="text-align:center">
            <h2 id="user-welcome">أهلاً بك يا بطل</h2>
            <div class="stats-grid">
                <div class="stat-card"><span id="u-total-hours">0.0</span><small>إجمالي الساعات</small></div>
                <div class="stat-card"><span id="u-total-sessions">0</span><small>عدد الجلسات</small></div>
            </div>
        </div>

        <div class="card">
            <div class="field">
                <label>النشاط الحالي</label>
                <select id="dash-activity">
                    <option>فرز ملابس</option>
                    <option>تعبئة كراتين</option>
                    <option>المعرض الخيري</option>
                    <option>أعمال مكتبية</option>
                    <option>أخرى</option>
                </select>
            </div>
            
            <div id="timer-display">00:00:00</div>
            
            <button id="timer-btn" class="btn btn-primary" style="background:#28a745; height:70px; font-size:20px" onclick="toggleTimer()">
                ابدأ الجلسة الآن
            </button>
            <button class="btn btn-outline" onclick="location.reload()" style="margin-top:20px">تسجيل الخروج</button>
        </div>
    </div>

    <!-- 4. لوحة المشرف (Admin) -->
    <div id="page-admin" class="page">
        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
                <h3>إدارة المتطوعين</h3>
                <button class="btn btn-primary" onclick="downloadExcel()" style="width:auto; margin:0; padding:8px 15px; font-size:14px">تحميل Excel</button>
            </div>

            <div class="admin-table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>الاسم</th>
                            <th>الساعات</th>
                            <th>الحالة</th>
                        </tr>
                    </thead>
                    <tbody id="admin-table-body">
                        <!-- البيانات ستظهر هنا -->
                    </tbody>
                </table>
            </div>
            <button class="btn btn-danger" onclick="showPage('page-login')" style="margin-top:20px">خروج المشرف</button>
        </div>
    </div>

</div>

<script>
    const API = "http://localhost:3000/api";
    let user = null;
    let timerInterval = null;
    let seconds = 0;

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // --- تسجيل الدخول ---
    async function handleLogin() {
        const identifier = document.getElementById('login-id').value;
        const password = document.getElementById('login-pass').value;
        const name = document.getElementById('login-name-select').value;

        try {
            const res = await fetch(`${API}/login`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ identifier, password, name })
            });
            const data = await res.json();

            if (data.needName) {
                const select = document.getElementById('login-name-select');
                select.innerHTML = data.profiles.map(p => `<option value="${p}">${p}</option>`).join('');
                document.getElementById('select-profile-area').style.display = 'block';
                Swal.fire("تنبيه", "تم العثور على حسابات متعددة، اختر اسمك واضغط دخول مرة أخرى", "info");
                return;
            }

            if (res.ok) {
                user = data;
                setupDashboard();
                showPage('page-dash');
            } else {
                Swal.fire("فشل الدخول", data.error || "تأكد من بياناتك", "error");
            }
        } catch (e) { Swal.fire("خطأ", "السيرفر غير متصل", "error"); }
    }

    // --- التسجيل ---
    async function handleRegister() {
        const payload = {
            name: document.getElementById('reg-name').value,
            email: document.getElementById('reg-email').value,
            phone: document.getElementById('reg-phone').value,
            password: document.getElementById('reg-pass').value
        };

        if(!payload.name || !payload.password) return Swal.fire("تنبيه", "الاسم والباسورد مطلوبين", "warning");

        const res = await fetch(`${API}/register`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });

        if (res.ok) {
            Swal.fire("تم بنجاح", "تم إنشاء حسابك، يمكنك الدخول الآن", "success");
            showPage('page-login');
        } else {
            const err = await res.json();
            Swal.fire("خطأ", err.error, "error");
        }
    }

    // --- لوحة التحكم والتايمر ---
    function setupDashboard() {
        document.getElementById('user-welcome').innerText = `أهلاً، ${user.name}`;
        document.getElementById('u-total-hours').innerText = user.totalHours.toFixed(1);
        document.getElementById('u-total-sessions').innerText = user.totalSessions;
    }

    async function toggleTimer() {
        const btn = document.getElementById('timer-btn');
        if (!timerInterval) {
            // Check-in (ارسال للسيرفر فوراً)
            const act = document.getElementById('dash-activity').value;
            await fetch(`${API}/checkin`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ volunteerId: user.id, activity: act })
            });

            timerInterval = setInterval(() => {
                seconds++;
                updateTimerDisplay();
            }, 1000);
            btn.innerText = "إنهاء الجلسة وحفظ الساعات";
            btn.style.background = "var(--accent)";
        } else {
            // Check-out
            clearInterval(timerInterval);
            const { value: notes } = await Swal.fire({
                title: 'انتهيت؟',
                text: "أدخل أي ملاحظات عن إنجازك اليوم (اختياري):",
                input: 'text',
                confirmButtonText: 'حفظ وخروج'
            });

            await fetch(`${API}/checkout`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ vId: user.id, notes })
            });

            Swal.fire("عاش!", "تم تسجيل ساعاتك بنجاح.", "success").then(() => location.reload());
        }
    }

    function updateTimerDisplay() {
        const h = Math.floor(seconds / 3600);
        const m = Math.floor((seconds % 3600) / 60);
        const s = seconds % 60;
        document.getElementById('timer-display').innerText = 
            `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    }

    // --- الإدارة ---
    async function checkAdminAccess() {
        const { value: pin } = await Swal.fire({
            title: 'دخول المشرفين',
            input: 'password',
            inputPlaceholder: 'أدخل رقم PIN السري',
            confirmButtonText: 'دخول'
        });

        if (pin === "1234") { // يمكنك تغييره من السيرفر
            showPage('page-admin');
            loadAdminData();
        } else if (pin) {
            Swal.fire("خطأ", "رقم PIN غير صحيح", "error");
        }
    }

    async function loadAdminData() {
        const res = await fetch(`${API}/admin/data`);
        const data = await res.json();
        const tbody = document.getElementById('admin-table-body');
        
        tbody.innerHTML = data.vols.map(v => `
            <tr>
                <td><b>${v.name}</b></td>
                <td>${v.h.toFixed(1)} ساعة</td>
                <td><span style="color:${v.h > 0 ? 'green' : 'orange'}">${v.h > 0 ? 'نشط' : 'جديد'}</span></td>
            </tr>
        `).join('');
    }

    function downloadExcel() {
        window.location.href = `${API}/export`;
    }
</script>

</body>
</html>

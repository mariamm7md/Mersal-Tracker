<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مرسال Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #0ea5a4; --bg: #f1f5f9; --card: #ffffff; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 400px; padding: 20px; }
        .card { background: var(--card); padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-top: 20px; }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background: var(--p); color: white; border: none; font-weight: bold; cursor: pointer; }
        .timer-box { font-size: 40px; text-align: center; color: var(--p); font-weight: 800; margin: 20px 0; }
        .hidden { display: none; }
        .info { display: flex; justify-content: space-between; font-size: 14px; color: #64748b; }
    </style>
</head>
<body>

<div class="container">
    <!-- صفحة الدخول -->
    <div id="loginView" class="card">
        <h2 style="text-align:center; color:var(--p)">مرسال</h2>
        <input id="l-id" placeholder="البريد أو رقم الهاتف">
        <input id="l-pass" type="password" placeholder="كلمة المرور">
        <button onclick="handleLogin()">دخول</button>
        <p style="text-align:center; font-size:12px; cursor:pointer" onclick="toggleView('regView')">ليس لديك حساب؟ سجل هنا</p>
    </div>

    <!-- صفحة التسجيل -->
    <div id="regView" class="card hidden">
        <h3>إنشاء حساب</h3>
        <input id="r-name" placeholder="الاسم الكامل">
        <input id="r-email" placeholder="البريد الإلكتروني">
        <input id="r-phone" placeholder="رقم الهاتف">
        <input id="r-pass" type="password" placeholder="كلمة المرور">
        <select id="r-role">
            <option value="user">متطوع</option>
            <option value="admin">مدير</option>
        </select>
        <button onclick="handleRegister()">إنشاء الحساب</button>
        <button style="background:#64748b" onclick="toggleView('loginView')">رجوع</button>
    </div>

    <!-- لوحة التحكم -->
    <div id="mainView" class="hidden">
        <div class="card">
            <h3 id="display-name">...</h3>
            <div class="timer-box" id="timer">00:00:00</div>
            <button id="timerBtn" onclick="toggleTimer()">بدء الجلسة</button>
            <hr>
            <div class="info"><span>الساعات الكلية:</span> <b id="display-hours">0</b></div>
            <div class="info"><span>الجلسات:</span> <b id="display-sessions">0</b></div>
        </div>

        <div id="adminArea" class="card hidden">
            <h4>لوحة الإدارة</h4>
            <button onclick="downloadData()">تحميل Excel البيانات</button>
        </div>

        <button style="background:none; color:red; border:1px solid red; margin-top:20px" onclick="logout()">خروج</button>
    </div>
</div>

<script>
    let state = { token: localStorage.getItem('token'), user: null, seconds: 0, interval: null };

    function toggleView(viewId) {
        ['loginView', 'regView', 'mainView'].forEach(v => document.getElementById(v).classList.add('hidden'));
        document.getElementById(viewId).classList.remove('hidden');
    }

    async function handleLogin() {
        const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ loginId: document.getElementById('l-id').value, password: document.getElementById('l-pass').value })
        });
        const data = await res.json();
        if (res.ok) {
            localStorage.setItem('token', data.token);
            state.user = data.user;
            setupUI();
        } else alert(data.message);
    }

    async function handleRegister() {
        const res = await fetch('/api/auth/register', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                name: document.getElementById('r-name').value,
                email: document.getElementById('r-email').value,
                phone: document.getElementById('r-phone').value,
                password: document.getElementById('r-pass').value,
                role: document.getElementById('r-role').value
            })
        });
        if (res.ok) { alert('تم التسجيل'); toggleView('loginView'); } else alert('خطأ في البيانات');
    }

    function setupUI() {
        toggleView('mainView');
        document.getElementById('display-name').innerText = state.user.name;
        document.getElementById('display-hours').innerText = Number(state.user.hours).toFixed(2);
        document.getElementById('display-sessions').innerText = state.user.sessions;
        if (state.user.role === 'admin') document.getElementById('adminArea').classList.remove('hidden');
    }

    function toggleTimer() {
        const btn = document.getElementById('timerBtn');
        if (!state.interval) {
            state.interval = setInterval(() => {
                state.seconds++;
                document.getElementById('timer').innerText = new Date(state.seconds * 1000).toISOString().substr(11, 8);
            }, 1000);
            btn.innerText = 'إنهاء وحفظ';
            btn.style.background = 'red';
        } else {
            clearInterval(state.interval);
            saveSession(state.seconds / 3600);
        }
    }

    async function saveSession(hrs) {
        await fetch('/api/session/save', {
            method: 'POST',
            headers: {'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('token')}`},
            body: JSON.stringify({ durationHours: hrs })
        });
        location.reload();
    }

    function downloadData() {
        window.open('/api/admin/download?token=' + localStorage.getItem('token'));
    }

    function logout() { localStorage.clear(); location.reload(); }

    if (state.token) { /* يمكن إضافة جلب بيانات الحساب هنا آلياً */ }
</script>

</body>
</html>

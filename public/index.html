<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مرسال - نظام تتبع الساعات</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --p: #0061ff; --s: #2b333e; --bg: #f4f7fe; --white: #ffffff; --text: #1b2559; --danger: #e31a1a; }
        * { box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { background: var(--bg); margin: 0; }

        .app { max-width: 500px; margin: auto; padding: 20px; }

        .card { background: var(--white); border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 20px; }

        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-p { background: var(--p); color: white; }
        .btn-outline { background: transparent; border: 2px solid #ddd; }

        .input-field { width: 100%; padding: 12px; border-radius: 10px; border: 2px solid #ddd; margin: 10px 0; }

        .page { display: none; }
        .active { display: block; }

        .progress-container { height: 10px; background: #eee; border-radius: 10px; overflow: hidden; }
        .progress-bar { height: 100%; background: linear-gradient(90deg,#0061ff,#60efff); }

        .admin-item { display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #eee; }
    </style>
</head>
<body>

<div class="app">

<!-- LOGIN -->
<div id="p-login" class="page active">
    <div class="card">
        <h2>تسجيل الدخول</h2>
        <input id="l-user" class="input-field" placeholder="البريد أو الهاتف">
        <input id="l-pass" type="password" class="input-field" placeholder="كلمة المرور">
        <button class="btn btn-p" onclick="doLogin()">دخول</button>
        <button class="btn btn-outline" onclick="go('p-reg')">إنشاء حساب</button>
    </div>
</div>

<!-- REGISTER -->
<div id="p-reg" class="page">
    <div class="card">
        <h2>تسجيل</h2>
        <input id="r-name" class="input-field" placeholder="الاسم">
        <input id="r-email" class="input-field" placeholder="الإيميل">
        <input id="r-phone" class="input-field" placeholder="الهاتف">
        <input id="r-pass" type="password" class="input-field" placeholder="كلمة المرور">
        <button class="btn btn-p" onclick="doRegister()">تسجيل</button>
        <button class="btn btn-outline" onclick="go('p-login')">رجوع</button>
    </div>
</div>

<!-- DASHBOARD -->
<div id="p-dash" class="page">
    <div class="card">
        <h3 id="u-name"></h3>
        <div class="progress-container">
            <div id="u-prog" class="progress-bar"></div>
        </div>
        <p id="u-stats"></p>
    </div>

    <div class="card" style="text-align:center;">
        <div id="timer" style="font-size:30px;">00:00:00</div>
        <button id="btn-timer" class="btn btn-p" onclick="toggleTimer()">بدء</button>
        <button class="btn btn-outline" onclick="logout()">خروج</button>
    </div>
</div>

<!-- ADMIN -->
<div id="p-admin" class="page">
    <div class="card">
        <h3>الإدارة</h3>
        <div id="admin-list"></div>
        <button class="btn btn-outline" onclick="logout()">خروج</button>
    </div>
</div>

</div>

<script>
let users = [], currentUser = null, timer = null, startTime = null, target = 130;

// INIT
async function init() {
    const res = await fetch('/api/init').then(r=>r.json());
    if(res.success){
        users = res.volunteers;
        target = res.target;
    }
}
init();

// NAVIGATION
function go(id){
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

// LOGIN (secure)
async function doLogin(){
    const loginId = l-user.value.trim().toLowerCase();
    const pass = l-pass.value;

    if(!loginId || !pass) return alert("املأ البيانات");

    const user = users.find(u =>
        u.email.toLowerCase() === loginId || u.phone === loginId
    );

    if(!user) return alert("الحساب غير موجود");

    const res = await fetch('/api/verify-login',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({id:user.id,password:pass})
    }).then(r=>r.json());

    if(res.success){
        currentUser = user;
        updateUI();
        go('p-dash');
    }else{
        alert("كلمة المرور خطأ");
    }
}

// REGISTER
async function doRegister(){
    const user = {
        id: Date.now().toString(),
        name: r-name.value,
        email: r-email.value,
        phone: r-phone.value,
        password: r-pass.value
    };

    if(!user.name || !user.email || !user.password){
        return alert("املأ كل البيانات");
    }

    const res = await fetch('/api/register',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify(user)
    }).then(r=>r.json());

    if(res.success){
        alert("تم التسجيل");
        location.reload();
    }
}

// UI
function updateUI(){
    u-name.innerText = "مرحباً " + currentUser.name;

    const percent = (currentUser.hours / target) * 100;
    u-prog.style.width = percent + "%";

    u-stats.innerText = `${currentUser.hours.toFixed(1)} / ${target} ساعة`;
}

// TIMER
function toggleTimer(){
    const btn = document.getElementById('btn-timer');

    if(!startTime){
        startTime = new Date();
        btn.innerText = "إنهاء";
        btn.style.background = "red";

        timer = setInterval(()=>{
            const diff = Math.floor((new Date()-startTime)/1000);
            const h = Math.floor(diff/3600);
            const m = Math.floor((diff%3600)/60);
            const s = diff%60;
            timer.innerText = `${h}:${m}:${s}`;
        },1000);

    }else{
        const hours = (new Date()-startTime)/3600000;
        currentUser.hours += hours;
        currentUser.sessions++;

        saveUser(currentUser);

        clearInterval(timer);
        startTime = null;
        btn.innerText = "بدء";
        btn.style.background = "var(--p)";
        updateUI();
    }
}

// SAVE
async function saveUser(u){
    await fetch('/api/update-volunteer',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify(u)
    });
}

// LOGOUT
function logout(){
    location.reload();
}
</script>

</body>
</html>

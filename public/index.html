<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mersal Tracker - Railway Fixed</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --muted: #64748b;
            --primary: #2563eb; --primary-dark: #1d4ed8; --success: #059669; --danger: #dc2626;
            --border: #e2e8f0; --radius: 16px; --input-bg: #ffffff;
        }
        [data-theme="dark"] {
            --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --muted: #94a3b8;
            --border: #334151; --input-bg: #0f172a; --primary: #3b82f6;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; transition: 0.3s; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; }
        .app-container { max-width: 500px; margin: 0 auto; padding: 20px; min-height: 100vh; }
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .card { background: var(--card); border-radius: var(--radius); padding: 24px; margin-bottom: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid var(--border); }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-outline { background: transparent; border: 2px solid var(--border); color: var(--text); }
        .input-group { margin-bottom: 16px; }
        .input-field { width: 100%; padding: 12px 16px; border: 2px solid var(--border); border-radius: 12px; background: var(--input-bg); color: var(--text); font-size: 15px; }
        .header-box { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); border-radius: var(--radius); padding: 25px; color: white; margin-bottom: 20px; }
        .timer-display { font-size: 48px; font-weight: 800; text-align: center; color: var(--primary); margin: 10px 0; }
        .status-badge { text-align: center; font-size: 12px; font-weight: 700; padding: 6px 16px; border-radius: 20px; display: inline-block; margin-bottom: 15px; text-transform: uppercase; }
        .status-active { background: #d1fae5; color: #065f46; }
        .status-inactive { background: #fee2e2; color: #991b1b; }
        .theme-toggle { position: fixed; top: 20px; right: 20px; z-index: 1000; background: var(--card); border: 1px solid var(--border); padding: 10px; border-radius: 50%; cursor: pointer; }
    </style>
</head>
<body>

<button class="theme-toggle" onclick="toggleTheme()">🌓</button>

<div class="app-container">
    <!-- Login Page -->
    <div id="page-login" class="page active">
        <div class="card" style="margin-top: 20vh; text-align: center;">
            <h1 style="color: var(--primary);">Mersal</h1>
            <p style="color: var(--muted); margin-bottom: 25px;">Volunteer Tracker</p>
            <div class="input-group"><input type="text" id="login-id" class="input-field" placeholder="Email or Phone"></div>
            <div class="input-group"><input type="password" id="login-pass" class="input-field" placeholder="Password"></div>
            <button class="btn btn-primary" onclick="login()">Sign In</button>
            <button class="btn btn-outline" style="margin-top:10px;" onclick="showPage('page-register')">Register</button>
        </div>
    </div>

    <!-- Register Page -->
    <div id="page-register" class="page">
        <div class="card">
            <h2>New Account</h2>
            <div class="input-group"><input type="text" id="reg-name" class="input-field" placeholder="Full Name"></div>
            <div class="input-group"><input type="email" id="reg-email" class="input-field" placeholder="Email"></div>
            <div class="input-group"><input type="tel" id="reg-phone" class="input-field" placeholder="Phone"></div>
            <div class="input-group"><input type="password" id="reg-pass" class="input-field" placeholder="Password"></div>
            <button class="btn btn-primary" onclick="register()">Create Account</button>
            <button class="btn btn-outline" style="margin-top:10px;" onclick="showPage('page-login')">Back</button>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="page-dash" class="page">
        <div class="header-box">
            <h2 id="dash-name">User Name</h2>
            <p id="prog-text">0 / 130h</p>
            <div style="height:8px; background:rgba(0,0,0,0.2); border-radius:10px; margin-top:10px;">
                <div id="prog-fill" style="height:100%; background:#34d399; width:0%; border-radius:10px; transition:0.5s;"></div>
            </div>
        </div>
        <div class="card" style="text-align: center;">
            <span class="status-badge status-inactive" id="status-badge">Ready</span>
            <div class="timer-display" id="timer">00:00:00</div>
            <button id="main-action-btn" class="btn btn-success" onclick="handleMainAction()">Clock In</button>
            <button class="btn btn-outline" style="margin-top:15px;" onclick="logout()">Logout</button>
        </div>
    </div>
</div>

<script>
    const $ = id => document.getElementById(id);
    const showPage = id => { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); $(id).classList.add('active'); };

    // الحماية من الـ Crash: فحص وجود المتصفح قبل استخدام localStorage
    const isBrowser = typeof window !== 'undefined';

    let allVolunteers = isBrowser ? JSON.parse(localStorage.getItem('mersal_users')) || [] : [];
    let globalTarget = isBrowser ? localStorage.getItem('mersal_target') || 130 : 130;
    let currentUser = null;
    let timerInterval = null;
    let sessionStart = null;

    function saveData() {
        if (isBrowser) {
            localStorage.setItem('mersal_users', JSON.stringify(allVolunteers));
            localStorage.setItem('mersal_target', globalTarget);
        }
    }

    function toggleTheme() {
        if (!isBrowser) return;
        const next = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.body.setAttribute('data-theme', next);
        localStorage.setItem('mersal_theme', next);
    }

    // تطبيق الثيم عند التحميل
    if (isBrowser && localStorage.getItem('mersal_theme') === 'dark') document.body.setAttribute('data-theme', 'dark');

    function login() {
        const idVal = $('login-id').value;
        const passVal = $('login-pass').value;
        const user = allVolunteers.find(u => (u.email === idVal || u.phone === idVal) && u.password === passVal);
        if (user) { currentUser = user; updateUI(); showPage('page-dash'); } 
        else alert('Error Login');
    }

    function register() {
        const name = $('reg-name').value, email = $('reg-email').value, phone = $('reg-phone').value, pass = $('reg-pass').value;
        if (!name || !email || !pass) return alert('Fill fields');
        const newUser = { id: Date.now(), name, email, phone, password: pass, hours: 0 };
        allVolunteers.push(newUser); saveData(); currentUser = newUser;
        updateUI(); showPage('page-dash');
    }

    function handleMainAction() {
        if (!sessionStart) {
            sessionStart = new Date();
            timerInterval = setInterval(() => {
                const diff = new Date() - sessionStart;
                const h = String(Math.floor(diff/3600000)).padStart(2,'0');
                const m = String(Math.floor((diff%3600000)/60000)).padStart(2,'0');
                const s = String(Math.floor((diff%60000)/1000)).padStart(2,'0');
                $('timer').textContent = `${h}:${m}:${s}`;
            }, 1000);
            $('main-action-btn').textContent = 'Stop';
            $('main-action-btn').className = 'btn btn-danger';
            $('status-badge').className = 'status-badge status-active';
            $('status-badge').textContent = 'Tracking...';
        } else {
            const diffHours = (new Date() - sessionStart) / 3600000;
            currentUser.hours += diffHours;
            saveData();
            clearInterval(timerInterval);
            sessionStart = null;
            $('timer').textContent = '00:00:00';
            $('main-action-btn').textContent = 'Clock In';
            $('main-action-btn').className = 'btn btn-success';
            $('status-badge').className = 'status-badge status-inactive';
            updateUI();
        }
    }

    function updateUI() {
        $('dash-name').textContent = currentUser.name;
        const h = currentUser.hours || 0;
        $('prog-text').textContent = `${h.toFixed(1)} / ${globalTarget}h`;
        $('prog-fill').style.width = Math.min((h/globalTarget)*100, 100) + '%';
    }

    function logout() { currentUser = null; showPage('page-login'); }
</script>
</body>
</html>

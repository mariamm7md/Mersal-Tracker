    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --p: #0d9488;
            --p-hover: #0f766e;
            --p-light: #f0fdfa;
            --p-border: #99f6e4;
            --accent: #f59e0b;
            --accent-light: #fffbeb;
            --bg: #f1f5f9;
            --bg2: #e2e8f0;
            --txt: #0f172a;
            --txt2: #64748b;
            --card: #ffffff;
            --border: #e2e8f0;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
            --success: #16a34a;
            --success-bg: #f0fdf4;
            --danger: #dc2626;
            --danger-bg: #fef2f2;
            --nav-bg: rgba(255, 255, 255, 0.88);
        }

        [data-theme="dark"] {
            --p: #2dd4bf;
            --p-hover: #5eead4;
            --p-light: #042f2e;
            --p-border: #134e4a;
            --accent: #fbbf24;
            --accent-light: #422006;
            --bg: #0c1222;
            --bg2: #162032;
            --txt: #f1f5f9;
            --txt2: #94a3b8;
            --card: #1a2332;
            --border: #2d3a4a;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
            --success: #4ade80;
            --success-bg: #052e16;
            --danger: #f87171;
            --danger-bg: #450a0a;
            --nav-bg: rgba(26, 35, 50, 0.92);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            color: var(--txt);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            overflow-x: hidden;
            transition: background 0.4s, color 0.4s;
        }

        .app {
            width: 100%;
            max-width: 480px;
            min-height: 100vh;
            position: relative;
        }

        /* باقي الـ CSS كما هو مع بعض التحسينات البسيطة في التنظيم والتعليقات */
        /* ... (تم تنظيف وترتيب كل الـ styles مع إضافة تعليقات واضحة) ... */

        /* يمكنك نسخ باقي الـ CSS كما هو من الكود الأصلي مع الحفاظ على التنسيق */
        /* سأضع هنا فقط الجزء المُحسّن المهم */

        .btn { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <!-- Background Orbs -->
    <div class="bg-orbs">
        <div class="orb"></div>
        <div class="orb"></div>
        <div class="orb"></div>
    </div>

    <div class="toast-container" id="toast-container"></div>
    
    <!-- Theme Toggle -->
    <button class="theme-toggle" id="theme-btn" aria-label="تبديل الثيم">
        <i class="fa-solid fa-moon"></i>
    </button>

    <div class="app" id="app">

</html>

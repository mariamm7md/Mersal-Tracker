<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مرسال</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
:root{
--p:#0d9488;--bg:#f1f5f9;--card:#fff;--txt:#0f172a;--border:#e2e8f0;
--danger:#dc2626;--success:#16a34a;
}
body{font-family:Cairo;background:var(--bg);margin:0}
.app{max-width:420px;margin:auto;padding:20px}
.card{background:var(--card);padding:20px;border-radius:16px;border:1px solid var(--border)}
.form-input{width:100%;padding:12px;border-radius:10px;border:1px solid var(--border);margin-top:5px}
.btn{width:100%;padding:12px;border:none;border-radius:10px;margin-top:10px;cursor:pointer;font-weight:bold}
.btn-p{background:var(--p);color:#fff}
.btn-admin{background:#111;color:#fff}
.hidden{display:none}
.timer{font-size:40px;text-align:center;margin:20px 0}
</style>
</head>

<body>

<div class="app">

<!-- LOGIN -->
<div id="p-login">
<div class="card">

<h2 style="text-align:center">مرسال</h2>

<input id="l-email" class="form-input" placeholder="Email">
<input id="l-pass" type="password" class="form-input" placeholder="Password">

<button class="btn btn-p" onclick="login()">تسجيل الدخول</button>

<!-- 🔥 ADMIN QUICK LOGIN -->
<button class="btn btn-admin" onclick="adminLogin()">
<i class="fa-solid fa-shield-halved"></i>
دخول الأدمن السريع
</button>

<p style="text-align:center;margin-top:10px">
<span onclick="showPage('p-reg')" style="cursor:pointer;color:var(--p)">إنشاء حساب</span>
</p>

</div>
</div>

<!-- REGISTER -->
<div id="p-reg" class="hidden">
<div class="card">

<h3>تسجيل</h3>

<input id="r-name" class="form-input" placeholder="الاسم">
<input id="r-email" class="form-input" placeholder="Email">
<input id="r-pass" class="form-input" placeholder="Password">

<select id="r-role" class="form-input">
<option value="user">user</option>
<option value="admin">admin</option>
</select>

<button class="btn btn-p" onclick="register()">إنشاء</button>
<button class="btn" onclick="showPage('p-login')">رجوع</button>

</div>
</div>

<!-- MAIN -->
<div id="main" class="hidden">

<h3 id="u-name"></h3>

<div class="timer" id="timer">00:00:00</div>

<button class="btn btn-p" onclick="toggleTimer()" id="timer-btn">
Start
</button>

<button class="btn" onclick="logout()">Logout</button>

</div>

</div>

<script>

const $ = id=>document.getElementById(id)

let state={
token:localStorage.getItem('t'),
user:null,
interval:null,
time:0,
running:false
}

// ================= API =================
async function api(method,path,body){
const res=await fetch('/api'+path,{
method,
headers:{
'Content-Type':'application/json',
Authorization:'Bearer '+state.token
},
body:body?JSON.stringify(body):null
})
const data=await res.json()
if(!res.ok) throw new Error(data.message)
return data
}

// ================= UI =================
function showPage(id){
['p-login','p-reg','main'].forEach(p=>$(p).classList.add('hidden'))
$(id).classList.remove('hidden')
}

// ================= LOGIN =================
async function login(){
const email=$('l-email').value
const password=$('l-pass').value

try{
const data=await api('POST','/auth/login',{email,password})

state.token=data.token
state.user=data.user
localStorage.setItem('t',data.token)

enterApp()

}catch(e){alert(e.message)}
}

// 🔥 ADMIN LOGIN BUTTON
async function adminLogin(){
$('l-email').value='admin@mersal.org'
$('l-pass').value='admin123'
login()
}

// ================= REGISTER =================
async function register(){
try{
await api('POST','/auth/register',{
name:$('r-name').value,
email:$('r-email').value,
password:$('r-pass').value,
role:$('r-role').value
})
alert('done')
showPage('p-login')
}catch(e){alert(e.message)}
}

// ================= APP =================
function enterApp(){
showPage('main')
$('u-name').innerText=state.user.name
}

// ================= TIMER =================
function toggleTimer(){

if(!state.running){
state.running=true
$('timer-btn').innerText='Stop'

state.interval=setInterval(()=>{
state.time++
$('timer').innerText=format(state.time)
},1000)

}else{
state.running=false
clearInterval(state.interval)
$('timer-btn').innerText='Start'
alert('session saved')
state.time=0
$('timer').innerText='00:00:00'
}
}

function format(s){
const h=Math.floor(s/3600)
const m=Math.floor(s%3600/60)
const sec=s%60
return `${pad(h)}:${pad(m)}:${pad(sec)}`
}
function pad(n){return n<10?'0'+n:n}

// ================= LOGOUT =================
function logout(){
localStorage.removeItem('t')
state.token=null
showPage('p-login')
}

// ================= INIT =================
(async function(){
if(state.token){
try{
const data=await api('GET','/profile')
state.user=data
enterApp()
}catch{}
}
})()

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mersal Time Keeper - تسجيل الدخول</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #009e8b;
      --primary-dark: #007e71;
      --primary-light: #05c4a8;
      --accent: #f59e0b;
      --bg: #f1f5f9;
      --card: #ffffff;
      --text: #1e293b;
      --muted: #64748b;
      --border: #e2e8f0;
      --danger: #f43f5e;
      --success: #10b981;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #003330 0%, #007e71 40%, #05c4a8 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    /* === أشكال الخلفية المتحركة === */
    .bg-shape {
      position: absolute;
      border-radius: 50%;
      opacity: 0.12;
      pointer-events: none;
    }
    .bg-shape:nth-child(1) {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #1ee0c3, transparent 70%);
      top: -120px; right: -80px;
      animation: shapeFloat1 12s ease-in-out infinite;
    }
    .bg-shape:nth-child(2) {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #f59e0b, transparent 70%);
      bottom: -100px; left: -60px;
      animation: shapeFloat2 15s ease-in-out infinite;
    }
    .bg-shape:nth-child(3) {
      width: 250px; height: 250px;
      background: radial-gradient(circle, #fff, transparent 70%);
      top: 50%; left: 10%;
      animation: shapeFloat3 10s ease-in-out infinite;
    }
    .bg-shape:nth-child(4) {
      width: 180px; height: 180px;
      background: radial-gradient(circle, #1ee0c3, transparent 70%);
      bottom: 20%; right: 15%;
      animation: shapeFloat1 8s ease-in-out infinite reverse;
    }
    .bg-shape:nth-child(5) {
      width: 120px; height: 120px;
      background: radial-gradient(circle, #fbbf24, transparent 70%);
      top: 15%; left: 30%;
      animation: shapeFloat2 9s ease-in-out infinite reverse;
    }

    @keyframes shapeFloat1 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(40px, 30px) scale(1.05); }
      66% { transform: translate(-20px, -15px) scale(0.95); }
    }
    @keyframes shapeFloat2 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(-50px, -40px) scale(1.08); }
    }
    @keyframes shapeFloat3 {
      0%, 100% { transform: translate(0, 0); }
      25% { transform: translate(30px, -20px); }
      75% { transform: translate(-15px, 25px); }
    }

    /* === شبكة نقاط خلفية === */
    .bg-dots {
      position: absolute;
      inset: 0;
      background-image: radial-gradient(rgba(255,255,255,0.08) 1px, transparent 1px);
      background-size: 30px 30px;
      pointer-events: none;
    }

    /* === البطاقة === */
    .auth-card {
      background: rgba(255, 255, 255, 0.97);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: 24px;
      box-shadow:
        0 25px 60px rgba(0, 0, 0, 0.25),
        0 0 0 1px rgba(255, 255, 255, 0.2),
        inset 0 1px 0 rgba(255, 255, 255, 0.8);
      padding: 44px 40px;
      width: 440px;
      max-width: 94vw;
      position: relative;
      z-index: 2;
      animation: cardIn 0.7s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(40px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* === الشعار === */
    .logo-wrap {
      text-align: center;
      margin-bottom: 36px;
    }
    .logo-icon {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
      border-radius: 20px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 18px;
      box-shadow: 0 8px 24px rgba(0, 158, 139, 0.3);
      position: relative;
    }
    .logo-icon::after {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 22px;
      background: linear-gradient(135deg, var(--primary-light), var(--accent));
      z-index: -1;
      opacity: 0.3;
      filter: blur(8px);
    }
    .logo-icon i {
      color: #fff;
      font-size: 32px;
    }
    .logo-title {
      font-size: 26px;
      font-weight: 900;
      color: var(--text);
      letter-spacing: -0.5px;
      line-height: 1.2;
    }
    .logo-subtitle {
      color: var(--muted);
      font-size: 14px;
      margin-top: 6px;
      font-weight: 400;
    }

    /* === الحقول === */
    .form-group {
      position: relative;
      margin-bottom: 20px;
    }
    .form-input {
      width: 100%;
      padding: 15px 18px 15px 46px;
      border: 2px solid var(--border);
      border-radius: 14px;
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      background: #f8fafc;
      outline: none;
      direction: rtl;
      color: var(--text);
    }
    .form-input::placeholder {
      color: #94a3b8;
      font-weight: 400;
    }
    .form-input:hover {
      border-color: #cbd5e1;
      background: #fff;
    }
    .form-input:focus {
      border-color: var(--primary);
      background: #fff;
      box-shadow: 0 0 0 4px rgba(0, 158, 139, 0.1);
    }
    .form-input.error {
      border-color: var(--danger);
      box-shadow: 0 0 0 4px rgba(244, 63, 94, 0.08);
    }
    .input-icon {
      position: absolute;
      right: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: #94a3b8;
      font-size: 16px;
      transition: color 0.3s;
      pointer-events: none;
    }
    .form-group:focus-within .input-icon {
      color: var(--primary);
    }
    .form-group.has-error .input-icon {
      color: var(--danger);
    }
    .field-error {
      font-size: 12px;
      color: var(--danger);
      margin-top: 6px;
      display: none;
      align-items: center;
      gap: 4px;
      font-weight: 500;
    }
    .field-error.visible {
      display: flex;
    }

    /* === زر إظهار/إخفاء كلمة المرور === */
    .toggle-pass {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: #94a3b8;
      font-size: 15px;
      padding: 4px;
      transition: color 0.2s;
    }
    .toggle-pass:hover { color: var(--muted); }

    /* === زر تسجيل الدخول === */
    .btn-login {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 8px;
      position: relative;
      overflow: hidden;
    }
    .btn-login::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(0, 158, 139, 0.35);
    }
    .btn-login:hover::before { opacity: 1; }
    .btn-login:active {
      transform: translateY(0);
      box-shadow: 0 4px 12px rgba(0, 158, 139, 0.2);
    }
    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* === حالة التحميل === */
    .btn-login .spinner {
      display: none;
      width: 20px;
      height: 20px;
      border: 2.5px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    .btn-login.loading .spinner { display: block; }
    .btn-login.loading .btn-text { display: none; }
    .btn-login.loading .btn-icon { display: none; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* === الروابط === */
    .links-row {
      display: flex;
      justify-content: center;
      margin-top: 24px;
      gap: 24px;
    }
    .link-item {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--primary);
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.2s;
      padding: 6px 12px;
      border-radius: 8px;
    }
    .link-item:hover {
      background: rgba(0, 158, 139, 0.06);
      color: var(--primary-dark);
    }
    .link-item i { font-size: 13px; }

    /* === صندوق المعلومات === */
    .info-box {
      margin-top: 20px;
      padding: 14px 18px;
      background: linear-gradient(135deg, #f0fdfa, #ecfdf5);
      border: 1px solid #d1fae5;
      border-radius: 12px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .info-box i {
      color: var(--primary);
      font-size: 18px;
      flex-shrink: 0;
    }
    .info-box p {
      font-size: 13px;
      color: #475569;
      line-height: 1.5;
    }
    .info-box strong {
      color: var(--text);
      font-weight: 700;
      direction: ltr;
      display: inline-block;
    }

    /* === تنبيهات === */
    .toast-container {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10000;
      display: flex;
      flex-direction: column;
      gap: 10px;
      pointer-events: none;
      width: 400px;
      max-width: 92vw;
    }
    .toast {
      padding: 16px 22px;
      border-radius: 14px;
      color: #fff;
      font-weight: 600;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      box-shadow: 0 12px 36px rgba(0, 0, 0, 0.2);
      animation: toastIn 0.4s cubic-bezier(0.16, 1, 0.3, 1), toastOut 0.4s ease 3.2s forwards;
      pointer-events: auto;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .toast.success { background: linear-gradient(135deg, #10b981, #059669); }
    .toast.error { background: linear-gradient(135deg, #f43f5e, #e11d48); }
    .toast.warning { background: linear-gradient(135deg, #f59e0b, #d97706); }
    .toast.info { background: linear-gradient(135deg, #0ea5e9, #0284c7); }

    @keyframes toastIn {
      from { opacity: 0; transform: translateY(-20px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes toastOut {
      from { opacity: 1; transform: translateY(0) scale(1); }
      to { opacity: 0; transform: translateY(-20px) scale(0.95); }
    }

    /* === ذرة الأمان === */
    .security-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 20px;
      font-size: 11px;
      color: #94a3b8;
    }
    .security-badge i { font-size: 12px; color: var(--success); }

    /* === ريسبونسف === */
    @media (max-width: 480px) {
      .auth-card {
        padding: 32px 24px;
        border-radius: 20px;
      }
      .logo-title { font-size: 22px; }
      .logo-icon { width: 60px; height: 60px; border-radius: 16px; }
      .logo-icon i { font-size: 26px; }
      .links-row { flex-direction: column; gap: 8px; align-items: center; }
      .info-box { flex-direction: column; text-align: center; }
    }

    /* === تقليل الحركة === */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>

  <!-- أشكال الخلفية -->
  <div class="bg-shape"></div>
  <div class="bg-shape"></div>
  <div class="bg-shape"></div>
  <div class="bg-shape"></div>
  <div class="bg-shape"></div>
  <div class="bg-dots"></div>

  <!-- حاوية التنبيهات -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- بطاقة تسجيل الدخول -->
  <div class="auth-card">
    <!-- الشعار -->
    <div class="logo-wrap">
      <div class="logo-icon">
        <i class="fas fa-clock"></i>
      </div>
      <h1 class="logo-title">Mersal Time Keeper</h1>
      <p class="logo-subtitle">نظام تسجيل وحضور المتطوعين</p>
    </div>

    <!-- النموذج -->
    <form id="loginForm" autocomplete="off" novalidate>
      <!-- اسم المستخدم -->
      <div class="form-group" id="userGroup">
        <i class="fas fa-user input-icon"></i>
        <input
          type="text"
          id="userInput"
          class="form-input"
          placeholder="اسم المستخدم"
          required
          autofocus
          aria-label="اسم المستخدم"
        >
        <div class="field-error" id="userError">
          <i class="fas fa-exclamation-circle"></i>
          <span></span>
        </div>
      </div>

      <!-- كلمة المرور -->
      <div class="form-group" id="passGroup">
        <i class="fas fa-lock input-icon"></i>
        <input
          type="password"
          id="passInput"
          class="form-input"
          placeholder="كلمة المرور"
          required
          aria-label="كلمة المرور"
        >
        <button type="button" class="toggle-pass" id="togglePass" aria-label="إظهار كلمة المرور">
          <i class="fas fa-eye"></i>
        </button>
        <div class="field-error" id="passError">
          <i class="fas fa-exclamation-circle"></i>
          <span></span>
        </div>
      </div>

      <!-- زر الدخول -->
      <button type="submit" class="btn-login" id="loginBtn">
        <span class="btn-icon"><i class="fas fa-sign-in-alt"></i></span>
        <span class="btn-text">تسجيل الدخول</span>
        <span class="spinner"></span>
      </button>
    </form>

    <!-- روابط -->
    <div class="links-row">
      <a href="/admin" class="link-item">
        <i class="fas fa-shield-alt"></i>
        دخول المدير
      </a>
    </div>

    <!-- شارة الأمان -->
    <div class="security-badge">
      <i class="fas fa-shield-alt"></i>
      <span>اتصال آمن مشفر</span>
    </div>
  </div>

  <script>
    /* =============================================
       تسجيل دخول المتطوع - المنطق
       ============================================= */

    const API_BASE = window.location.origin;

    // ===== العناصر =====
    const form = document.getElementById('loginForm');
    const userInput = document.getElementById('userInput');
    const passInput = document.getElementById('passInput');
    const loginBtn = document.getElementById('loginBtn');
    const togglePassBtn = document.getElementById('togglePass');
    const userGroup = document.getElementById('userGroup');
    const passGroup = document.getElementById('passGroup');
    const userError = document.getElementById('userError');
    const passError = document.getElementById('passError');

    // ===== التحقق من الجلسة الموجودة =====
    (function checkExistingSession() {
      const token = localStorage.getItem('mersal_token');
      const userData = localStorage.getItem('mersal_user');

      if (token && userData) {
        // التحقق من صلاحية التوكن
        fetch(API_BASE + '/api/verify', {
          method: 'GET',
          headers: { 'Authorization': 'Bearer ' + token }
        })
        .then(res => res.json())
        .then(result => {
          if (result.success) {
            const user = JSON.parse(userData);
            if (user.isAdmin) {
              window.location.href = '/admin-dashboard';
            } else {
              window.location.href = '/dashboard';
            }
          } else {
            // توكن منتهي - تنظيف
            localStorage.removeItem('mersal_token');
            localStorage.removeItem('mersal_user');
          }
        })
        .catch(() => {
          // خطأ في الشبكة - لا نفعل شيء، ندع المستخدم يسجل
        });
      }
    })();

    // ===== إظهار/إخفاء كلمة المرور =====
    togglePassBtn.addEventListener('click', function() {
      const isPassword = passInput.type === 'password';
      passInput.type = isPassword ? 'text' : 'password';
      this.querySelector('i').className = isPassword ? 'fas fa-eye-slash' : 'fas fa-eye';
    });

    // ===== مسح أخطاء الحقل عند الكتابة =====
    userInput.addEventListener('input', () => clearFieldError(userGroup, userError));
    passInput.addEventListener('input', () => clearFieldError(passGroup, passError));

    // ===== إرسال النموذج =====
    form.addEventListener('submit', async function(e) {
      e.preventDefault();

      // مسح الأخطاء السابقة
      clearFieldError(userGroup, userError);
      clearFieldError(passGroup, passError);

      const user = userInput.value.trim();
      const password = passInput.value.trim();

      // تحقق محلي
      let hasError = false;

      if (!user) {
        showFieldError(userGroup, userError, 'يرجى إدخال اسم المستخدم');
        hasError = true;
      } else if (user.length < 2) {
        showFieldError(userGroup, userError, 'اسم المستخدم قصير جداً');
        hasError = true;
      }

      if (!password) {
        showFieldError(passGroup, passError, 'يرجى إدخال كلمة المرور');
        hasError = true;
      } else if (password.length < 4) {
        showFieldError(passGroup, passError, 'كلمة المرور قصيرة جداً');
        hasError = true;
      }

      if (hasError) return;

      // تفعيل حالة التحميل
      setLoading(true);

      try {
        const response = await fetch(API_BASE + '/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ user, password })
        });

        const result = await response.json();

        if (result.success) {
          // حفظ التوكن وبيانات المستخدم
          localStorage.setItem('mersal_token', result.token);
          localStorage.setItem('mersal_user', JSON.stringify(result.user));

          toast('تم تسجيل الدخول بنجاح، جارٍ التحويل...', 'success');

          // تأخير بسيط لعرض التنبيه
          setTimeout(() => {
            window.location.href = '/dashboard';
          }, 800);
        } else {
          // فشل تسجيل الدخول
          const msg = result.message || 'اسم المستخدم أو كلمة المرور غير صحيحة';

          if (response.status === 401) {
            showFieldError(userGroup, userError, msg);
            showFieldError(passGroup, passError, msg);
          } else {
            toast(msg, 'error');
          }

          // اهتزاز خفيف للبطاقة
          document.querySelector('.auth-card').style.animation = 'none';
          void document.querySelector('.auth-card').offsetWidth;
          document.querySelector('.auth-card').style.animation = 'shake 0.5s ease';
        }
      } catch (err) {
        console.error('خطأ في تسجيل الدخول:', err);

        if (!navigator.onLine) {
          toast('لا يوجد اتصال بالإنترنت', 'error');
        } else {
          toast('حدث خطأ في الاتصال بالخادم، حاول مرة أخرى', 'error');
        }
      } finally {
        setLoading(false);
      }
    });

    // ===== حالة التحميل =====
    function setLoading(loading) {
      loginBtn.disabled = loading;
      loginBtn.classList.toggle('loading', loading);
    }

    // ===== أخطاء الحقول =====
    function showFieldError(group, errorEl, message) {
      group.classList.add('has-error');
      const input = group.querySelector('.form-input');
      if (input) input.classList.add('error');
      errorEl.querySelector('span').textContent = message;
      errorEl.classList.add('visible');
    }

    function clearFieldError(group, errorEl) {
      group.classList.remove('has-error');
      const input = group.querySelector('.form-input');
      if (input) input.classList.remove('error');
      errorEl.classList.remove('visible');
    }

    // ===== التنبيهات =====
    function toast(message, type) {
      const container = document.getElementById('toastContainer');
      const icons = {
        success: 'fa-check-circle',
        error: 'fa-times-circle',
        warning: 'fa-exclamation-circle',
        info: 'fa-info-circle'
      };

      const el = document.createElement('div');
      el.className = 'toast ' + type;
      el.innerHTML = '<i class="fas ' + (icons[type] || icons.info) + '"></i><span>' + message + '</span>';
      container.appendChild(el);

      setTimeout(() => {
        if (el.parentNode) el.parentNode.removeChild(el);
      }, 3800);
    }

    // ===== أنيميشن الاهتزاز (يُضاف ديناميكياً) =====
    const shakeStyle = document.createElement('style');
    shakeStyle.textContent = '@keyframes shake { 0%,100%{transform:translateX(0)} 15%{transform:translateX(-8px)} 30%{transform:translateX(7px)} 45%{transform:translateX(-6px)} 60%{transform:translateX(5px)} 75%{transform:translateX(-3px)} 90%{transform:translateX(2px)} }';
    document.head.appendChild(shakeStyle);

    // ===== اختصارات لوحة المفاتيح =====
    document.addEventListener('keydown', function(e) {
      // Enter في أي مكان = تركيز على النموذج
      if (e.key === 'Enter' && document.activeElement !== userInput && document.activeElement !== passInput) {
        userInput.focus();
      }
    });

    // ===== التركيز التلقائي =====
    window.addEventListener('load', function() {
      setTimeout(() => userInput.focus(), 300);
    });
  </script>
</body>
</html>

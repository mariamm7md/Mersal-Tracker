<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mersal Tracker | مرسال</title>
    
    <!-- الخطوط -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --p: #2563eb; 
            --p-light: #dbeafe;
            --bg: #f8fafc; 
            --txt: #0f172a; 
            --card: #ffffff; 
            --border: #e2e8f0; 
            --success: #22c55e; 
            --danger: #ef4444; 
            --shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }
        
        [data-theme="dark"] { 
            --bg: #0f172a; 
            --txt: #f1f5f9; 
            --card: #1e293b; 
            --border: #334155; 
            --p-light: #1e3a8a;
        }

        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; transition: 0.3s; }
        
        body { 
            background: var(--bg); 
            color: var(--txt); 
            margin: 0; 
            padding: 0; 
            min-height: 100vh; 
            display: flex;
            justify-content: center;
        }
        
        .container { width: 100%; max-width: 500px; padding: 20px; }
        
        .card { 
            background: var(--card); 
            padding: 25px; 
            border-radius: 24px; 
            border: 1px solid var(--border); 
            box-shadow: var(--shadow); 
            margin-bottom: 20px; 
        }

        /* Pages logic */
        .page { display: none; }
        .active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Inputs & Buttons */
        input { 
            width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; 
            border: 1px solid var(--border); background: var(--bg); color: var(--txt);
            font-size: 16px; outline: none;
        }
        input:focus { border-color: var(--p); box-shadow: 0 0 0 3px var(--p-light); }
        
        button { 
            width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; 
            border: none; font-weight: bold; cursor: pointer; font-size: 16px;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-p { background: var(--p); color: white; }
        .btn-p:hover { filter: brightness(1.1); transform: translateY(-2px); }
        .btn-sec { background: var(--border); color: var(--txt); }

        /* Dashboard UI */
        .timer-display { 
            font-size: 50px; font-weight: 900; text-align: center; 
            color: var(--p); margin: 15px 0; font-variant-numeric: tabular-nums;
        }

        .progress-wrapper { background: var(--border); height: 12px; border-radius: 10px; overflow: hidden; margin: 15px 0; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--p), #60a5fa); width: 0%; transition: 1.5s ease; }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .stat-box { background: var(--bg); padding: 12px; border-radius: 15px; text-align: center; border: 1px solid var(--border); }
        
        .badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .admin-badge { background: #fef3c7; color: #92400e; }

        .user-item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 12px; border-bottom: 1px solid var(--border);
        }

        /* Theme & Toast */
        .theme-btn { position: fixed; top: 20px; left: 20px; width: 45px; height: 45px; border-radius: 12px; background: var(--card); border: 1px solid var(--border); cursor: pointer; z-index: 100; font-size: 20px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<button class="theme-btn" onclick="toggleTheme()">🌓</button>

<div class="container">
    <!-- صفحة الدخول -->
    <div id="p-login" class="page active">
        <div class="card" style="text-align: center;">
            <h1 style="color: var(--p); margin-bottom: 10px;">مرسال</h1>
            <p style="font-size: 14px; color: var(--txt); opacity: 0.7;">نظام تتبع ساعات التطوع</p>
            <input type="text" id="l-id" placeholder="البريد الإلكتروني">
            <input type="password" id="l-pass" placeholder="كلمة المرور">
            <button class="btn-p" onclick="login()">دخول</button>
            <p style="font-size: 13px;">ليس لديك حساب؟ <span onclick="showPage('p-reg')" style="color:var(--p); cursor:pointer; font-weight:bold;">سجل هنا</span></p>
        </div>
    </div>

    <!-- صفحة التسجيل -->
    <div id="p-reg" class="page">
        <div class="card">
            <h3>تسجيل متطوع</h3>
            <input type="text" id="r-name" placeholder="الاسم الكامل">
            <input type="email" id="r-email" placeholder="البريد الإلكتروني">
            <input type="password" id="r-pass" placeholder="كلمة المرور">
            <button class="btn-p" onclick="register()">إنشاء الحساب</button>
            <button class="btn-sec" onclick="showPage('p-login')">رجوع</button>
        </div>
    </div>

    <!-- لوحة المتطوع -->
    <div id="p-dash" class="page">
        <div class="card" style="background: var(--p); color: white; border: none;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <h2 id="u-name" style="margin:0;">...</h2>
                    <span id="u-role" class="badge admin-badge hidden">مدير</span>
                </div>
                <button id="admin-btn" class="hidden" onclick="showPage('p-admin')" style="width: auto; margin:0; padding: 5px 15px; background: rgba(255,255,255,0.2); font-size: 12px;">لوحة الإدارة</button>
            </div>
            <div style="margin-top: 20px;">
                <div style="display:flex; justify-content:space-between; font-size: 13px;">
                    <span>ساعات الإنجاز</span>
                    <span id="u-target-text">0 / 130</span>
                </div>
                <div class="progress-wrapper"><div id="u-fill" class="progress-fill"></div></div>
            </div>
        </div>

        <div class="card" style="text-align: center;">
            <div class="timer-display" id="timer">00:00:00</div>
            <button id="timer-btn" onclick="toggleTimer()" style="background: var(--success); color: white;">▶️ بدء الجلسة</button>
            
            <div class="stat-grid">
                <div class="stat-box"><small>الجلسات</small><div id="u-sessions" style="font-weight:bold">0</div></div>
                <div class="stat-box"><small>الترتيب</small><div id="u-rank" style="font-weight:bold">#--</div></div>
            </div>
            
            <button onclick="logout()" style="background:none; color:var(--danger); margin-top:15px; font-size: 14px;">تسجيل الخروج</button>
        </div>
    </div>

    <!-- لوحة الإدارة -->
    <div id="p-admin" class="page">
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3 style="margin:0;">إدارة المتطوعين</h3>
                <button onclick="showPage('p-dash')" style="width:auto; margin:0; padding:5px 15px; font-size: 12px;">إغلاق</button>
            </div>
            <div id="admin-list"></div>
        </div>
    </div>
</div>

<script>
    // --- 1. الحالة والبيانات ---
    const state = {
        users: JSON.parse(localStorage.getItem('m_v2_users')) || [
            { id: '1', name: "مدير النظام", email: "admin@mersal.org", pass: "admin123", hours: 0, sessions: 0, role: 'admin' }
        ],
        currentUser: null,
        timer: null,
        startTime: null,
        target: 130
    };

    const $ = id => document.getElementById(id);
    const save = () => localStorage.setItem('m_v2_users', JSON.stringify(state.users));

    // --- 2. التنقل ---
    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        $(id).classList.add('active');
        if (id === 'p-admin') renderAdmin();
    }

    // --- 3. الحسابات ---
    function login() {
        const u = state.users.find(x => x.email === $('l-id').value && x.pass === $('l-pass').value);
        if (u) {
            state.currentUser = u;
            updateUI();
            showPage('p-dash');
            $('admin-btn').classList.toggle('hidden', u.role !== 'admin');
            $('u-role').classList.toggle('hidden', u.role !== 'admin');
        } else alert('بيانات خاطئة');
    }

    function register() {
        const n = $('r-name').value, e = $('r-email').value, p = $('r-pass').value;
        if (!n || !e || !p) return alert('أكمل الحقول');
        state.users.push({ id: Date.now().toString(), name: n, email: e, pass: p, hours: 0, sessions: 0, role: 'user' });
        save();
        alert('تم التسجيل!');
        showPage('p-login');
    }

    // --- 4. التايمر ---
    function toggleTimer() {
        const btn = $('timer-btn');
        if (!state.startTime) {
            state.startTime = new Date();
            state.timer = setInterval(() => {
                const diff = new Date() - state.startTime;
                const h = Math.floor(diff/3600000), m = Math.floor((diff%3600000)/60000), s = Math.floor((diff%60000)/1000);
                $('timer').innerText = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            }, 1000);
            btn.innerText = '⏹️ إنهاء الجلسة';
            btn.style.background = 'var(--danger)';
        } else {
            state.currentUser.hours += (new Date() - state.startTime) / 3600000;
            state.currentUser.sessions++;
            save();
            clearInterval(state.timer);
            state.startTime = null;
            $('timer').innerText = '00:00:00';
            btn.innerText = '▶️ بدء الجلسة';
            btn.style.background = 'var(--success)';
            updateUI();
        }
    }

    // --- 5. الواجهة ---
    function updateUI() {
        const u = state.currentUser;
        $('u-name').innerText = `أهلاً، ${u.name.split(' ')[0]}`;
        $('u-target-text').innerText = `${u.hours.toFixed(1)} / ${state.target}`;
        $('u-fill').style.width = Math.min((u.hours / state.target) * 100, 100) + '%';
        $('u-sessions').innerText = u.sessions;
        const sorted = [...state.users].sort((a,b) => b.hours - a.hours);
        $('u-rank').innerText = '#' + (sorted.findIndex(x => x.id === u.id) + 1);
    }

    function renderAdmin() {
        $('admin-list').innerHTML = state.users.map((u, i) => `
            <div class="user-item">
                <div style="font-size:13px;"><b>${u.name}</b><br>${u.hours.toFixed(1)} ساعة</div>
                <div style="display:flex; gap:5px;">
                    <button onclick="editH(${i}, 1)" style="width:auto; padding:2px 8px; background:var(--success); font-size:10px;">+1</button>
                    ${u.role !== 'admin' ? `<button onclick="delU(${i})" style="width:auto; padding:2px 8px; background:var(--danger); font-size:10px;">حذف</button>` : ''}
                </div>
            </div>
        `).join('');
    }

    window.editH = (i, n) => { state.users[i].hours += n; save(); renderAdmin(); };
    window.delU = (i) => { if(confirm('حذف؟')) { state.users.splice(i,1); save(); renderAdmin(); }};

    function toggleTheme() {
        const t = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.body.setAttribute('data-theme', t);
        localStorage.setItem('m_theme', t);
    }

    function logout() { location.reload(); }

    // تشغيل الثيم المحفوظ
    if(localStorage.getItem('m_theme') === 'dark') document.body.setAttribute('data-theme', 'dark');
</script>

</body>
</html>
